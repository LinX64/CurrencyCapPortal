<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gheymat - Full List of Currency Prices">
    <meta name="keywords" content="currency prices, exchange rates, Iranian currency, forex">
    <title>All Prices - Gheymat</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .prices-page {
            min-height: 100vh;
            padding-top: 80px;
            padding-bottom: 40px;
        }

        .prices-page-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .prices-page-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .prices-page-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .back-button:hover {
            background: var(--hover-overlay);
            border-color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .back-button svg {
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .back-button:hover svg {
            transform: translateX(-2px);
        }

        [dir="rtl"] .back-button {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .back-button svg {
            transform: scaleX(-1);
        }

        [dir="rtl"] .back-button:hover svg {
            transform: scaleX(-1) translateX(-2px);
        }

        .prices-container-full {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .prices-grid-full {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .prices-page-title {
                font-size: 2rem;
            }

            .prices-grid-full {
                grid-template-columns: 1fr;
            }
        }

        .price-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
        }

        .price-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--text-secondary);
        }

        .price-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .currency-flag {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--gradient-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 1px solid var(--border-color);
        }

        .currency-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .currency-code {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .currency-name {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .price-value {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .price-amount {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .price-change {
            font-size: 0.875rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            text-align: center;
        }

        .price-change.positive {
            color: var(--color-positive);
            background: var(--bg-positive);
        }

        .price-change.negative {
            color: var(--color-negative);
            background: var(--bg-negative);
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            backdrop-filter: blur(10px);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--color-positive);
            border-radius: 50%;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes ai-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes ai-rotate-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes ai-float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes ai-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <!-- AI Neural Network Background -->
    <canvas id="neuralBackground" class="neural-background"></canvas>
    <div class="ai-particles"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <svg class="logo-image animated-logo" width="40" height="40" viewBox="0 0 100 100" fill="none">
                <defs>
                    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--text-primary);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:var(--text-secondary);stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="40" stroke="url(#logoGradient)" stroke-width="2" fill="none" class="logo-circle"/>
                <circle cx="50" cy="50" r="30" stroke="url(#logoGradient)" stroke-width="1.5" fill="none" opacity="0.5" class="logo-circle-inner"/>
                <circle cx="30" cy="35" r="4" fill="url(#logoGradient)" class="logo-node node-1"/>
                <circle cx="70" cy="35" r="4" fill="url(#logoGradient)" class="logo-node node-2"/>
                <circle cx="50" cy="50" r="5" fill="url(#logoGradient)" class="logo-node node-3"/>
                <circle cx="35" cy="65" r="4" fill="url(#logoGradient)" class="logo-node node-4"/>
                <circle cx="65" cy="65" r="4" fill="url(#logoGradient)" class="logo-node node-5"/>
                <line x1="30" y1="35" x2="50" y2="50" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6" class="logo-connection"/>
                <line x1="70" y1="35" x2="50" y2="50" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6" class="logo-connection"/>
                <line x1="50" y1="50" x2="35" y2="65" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6" class="logo-connection"/>
                <line x1="50" y1="50" x2="65" y2="65" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6" class="logo-connection"/>
                <line x1="30" y1="35" x2="35" y2="65" stroke="url(#logoGradient)" stroke-width="1" opacity="0.4" class="logo-connection"/>
                <line x1="70" y1="35" x2="65" y2="65" stroke="url(#logoGradient)" stroke-width="1" opacity="0.4" class="logo-connection"/>
            </svg>
            <span class="logo-text">Gheymat</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link" data-i18n="nav.home">Home</a>
            <a href="index.html#download" class="nav-link" data-i18n="nav.download">Download</a>
        </div>
        <div class="nav-controls">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 1V3M12 21V23M23 12H21M3 12H1M20.485 20.485L19.071 19.071M4.929 4.929L3.515 3.515M20.485 3.515L19.071 4.929M4.929 19.071L3.515 20.485" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
            <button class="lang-toggle" id="langToggle" aria-label="Toggle language">
                <span class="lang-text">فا</span>
            </button>
        </div>
    </nav>

    <!-- Prices Page Content -->
    <main class="prices-page">
        <div class="prices-page-header">
            <h1 class="prices-page-title" id="pageTitle">All Currency Prices</h1>
            <p class="prices-page-subtitle" id="pageSubtitle">Real-time exchange rates for all available currencies</p>
            <div style="display: flex; justify-content: center; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 8px;">
                <a href="index.html" class="back-button">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" class="back-icon">
                        <path d="M15 10H5M5 10L10 15M5 10L10 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span id="backBtnLabel">Back to Home</span>
                </a>
                <span class="live-indicator">
                    <span class="pulse-dot"></span>
                    <span id="liveLabel">Live</span>
                </span>
            </div>
        </div>

        <div class="prices-container-full">
            <div class="prices-grid-full" id="pricesGridFull" role="list" aria-label="Currency prices">
                <!-- Price cards loaded by prices.js -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" style="margin-top: 60px;">
        <p data-i18n="footer.copyright">&copy; 2025 Gheymat. All rights reserved.</p>
    </footer>

    <script src="prices.js"></script>
    <script>
        // Initialize Neural Network Background for Prices Page
        class NeuralNetwork {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.nodes = [];
                this.nodeCount = 50;
                this.connections = [];
                this.maxDistance = 150;

                this.resize();
                this.init();
                this.animate();

                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            init() {
                this.nodes = [];
                for (let i = 0; i < this.nodeCount; i++) {
                    this.nodes.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3,
                        radius: Math.random() * 2 + 1,
                        pulsePhase: Math.random() * Math.PI * 2
                    });
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Update and draw nodes
                this.nodes.forEach((node, i) => {
                    // Move node
                    node.x += node.vx;
                    node.y += node.vy;

                    // Bounce off edges
                    if (node.x < 0 || node.x > this.canvas.width) node.vx *= -1;
                    if (node.y < 0 || node.y > this.canvas.height) node.vy *= -1;

                    // Draw node with pulse
                    node.pulsePhase += 0.02;
                    const pulse = Math.sin(node.pulsePhase) * 0.5 + 0.5;
                    const size = node.radius * (1 + pulse * 0.5);

                    this.ctx.beginPath();
                    this.ctx.arc(node.x, node.y, size, 0, Math.PI * 2);

                    const gradient = this.ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, size);
                    gradient.addColorStop(0, `rgba(158, 255, 0, ${0.8 * pulse})`);
                    gradient.addColorStop(1, `rgba(0, 128, 128, ${0.3 * pulse})`);

                    this.ctx.fillStyle = gradient;
                    this.ctx.fill();

                    // Draw connections
                    for (let j = i + 1; j < this.nodes.length; j++) {
                        const dx = this.nodes[j].x - node.x;
                        const dy = this.nodes[j].y - node.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < this.maxDistance) {
                            const opacity = (1 - distance / this.maxDistance) * 0.3;

                            const lineGradient = this.ctx.createLinearGradient(
                                node.x, node.y, this.nodes[j].x, this.nodes[j].y
                            );
                            lineGradient.addColorStop(0, `rgba(158, 255, 0, ${opacity})`);
                            lineGradient.addColorStop(1, `rgba(0, 128, 128, ${opacity})`);

                            this.ctx.beginPath();
                            this.ctx.moveTo(node.x, node.y);
                            this.ctx.lineTo(this.nodes[j].x, this.nodes[j].y);
                            this.ctx.strokeStyle = lineGradient;
                            this.ctx.lineWidth = 1;
                            this.ctx.stroke();
                        }
                    }
                });

                requestAnimationFrame(() => this.animate());
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            const neuralCanvas = document.getElementById('neuralBackground');
            if (neuralCanvas) {
                new NeuralNetwork(neuralCanvas);
            }

            // Add mouse tracking for price cards
            document.addEventListener('mousemove', (e) => {
                document.querySelectorAll('.price-item').forEach(card => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                });
            });
        });
    </script>
</body>
</html>
